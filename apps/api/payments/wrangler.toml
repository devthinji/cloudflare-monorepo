name               = "api-payments"
main               = "src/index.ts"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT        = "development"
LOG_LEVEL          = "info"

[[d1_databases]]
binding       = "DB"
database_name = "platform-db"
database_id   = "11909a8f-d177-4a08-a48a-fef7ce0c2df3"

[[kv_namespaces]]
binding    = "PAYMENTS_KV"
id         = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[[services]]
binding = "AGENT_WORKER"
service = "api-agent"

# Secrets (wrangler secret put): MPESA_CONSUMER_KEY, MPESA_CONSUMER_SECRET, MPESA_PASSKEY,
# MPESA_SHORTCODE, MPESA_CALLBACK_URL, MPESA_ENVIRONMENT
