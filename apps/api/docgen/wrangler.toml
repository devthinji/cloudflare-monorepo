name = "api-docgen"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
LOG_LEVEL   = "info"

[[d1_databases]]
binding       = "DB"
database_name = "platform-db"
database_id   = "REPLACE_WITH_D1_ID"

[[r2_buckets]]
binding     = "DOCS_BUCKET"
bucket_name = "platform-docs"
