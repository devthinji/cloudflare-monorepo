name = "api-agent"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
LOG_LEVEL   = "info"

# ── D1 ─────────────────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "platform-db"
database_id   = "REPLACE_WITH_D1_ID"

# ── KV — agent config cache ────────────────────────────────────────────────────
[[kv_namespaces]]
binding    = "AGENT_KV"
id         = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# ── R2 — document storage ─────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "DOCS_BUCKET"
bucket_name = "platform-docs"

# ── Service bindings ──────────────────────────────────────────────────────────
[[services]]
binding = "DOCGEN_WORKER"
service = "api-docgen"

[[services]]
binding = "PAYMENTS_WORKER"
service = "api-payments"

# ── Secrets ───────────────────────────────────────────────────────────────────
# GROQ_API_KEY
# JWT_SECRET
