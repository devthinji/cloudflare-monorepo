name               = "api-agent"
main               = "src/index.ts"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
LOG_LEVEL   = "info"

[[d1_databases]]
binding       = "DB"
database_name = "platform-db"
database_id   = "11909a8f-d177-4a08-a48a-fef7ce0c2df3"

[[kv_namespaces]]
binding    = "AGENT_KV"
id         = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[[r2_buckets]]
binding     = "DOCS_BUCKET"
bucket_name = "platform-docs"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name       = "AGENT_DO"
class_name = "AgentWorker"

[[migrations]]
tag                = "v1"
new_sqlite_classes = ["AgentWorker"]

[[services]]
binding = "DOCGEN_WORKER"
service = "api-docgen"

[[services]]
binding = "PAYMENTS_WORKER"
service = "api-payments"

# Secrets: DB_ENCRYPTION_KEY (required — 64-char hex, generate: openssl rand -hex 32)
