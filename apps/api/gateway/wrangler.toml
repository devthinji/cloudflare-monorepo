name = "api-gateway"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
LOG_LEVEL   = "info"

# ── KV — session cache ────────────────────────────────────────────────────────
[[kv_namespaces]]
binding    = "SESSIONS_KV"
id         = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# ── D1 ────────────────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "platform-db"
database_id   = "11909a8f-d177-4a08-a48a-fef7ce0c2df3"

# ── Service Bindings ─────────────────────────────────────────────────────────
[[services]]
binding = "AGENT_WORKER"
service = "api-agent"

[[services]]
binding = "DOCGEN_WORKER"
service = "api-docgen"

[[services]]
binding = "PAYMENTS_WORKER"
service = "api-payments"

# ── Secrets (wrangler secret put JWT_SECRET) ──────────────────────────────────
# JWT_SECRET
