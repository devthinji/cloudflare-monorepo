name               = "aaf-whatsapp"
main               = "src/index.ts"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
LOG_LEVEL   = "info"

[[kv_namespaces]]
binding = "AAF_KV"
id      = "REPLACE_WITH_AAF_WA_KV_ID"

[[services]]
binding = "API_GATEWAY"
service = "api-gateway"

# Secrets:
#   WHATSAPP_TOKEN
#   WHATSAPP_VERIFY_TOKEN
#   WHATSAPP_PHONE_NUMBER_ID
