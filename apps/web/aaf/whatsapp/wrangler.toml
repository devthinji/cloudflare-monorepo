name               = "aaf-whatsapp"
main               = "src/index.ts"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
LOG_LEVEL   = "info"

[[d1_databases]]
binding = "DB"
database_name = "platform-db"
database_id = "11909a8f-d177-4a08-a48a-fef7ce0c2df3"

[[kv_namespaces]]
binding = "AAF_KV"
id      = "REPLACE_WITH_AAF_WA_KV_ID"

[[services]]
binding = "API_GATEWAY"
service = "api-gateway"

# Secrets:
#   DB_ENCRYPTION_KEY      (AES-256-GCM key, 64 hex chars — for decrypting agent apiKeys/channelConfig)
