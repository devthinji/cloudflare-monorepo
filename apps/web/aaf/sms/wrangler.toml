name               = "aaf-sms"
main               = "src/index.ts"
compatibility_date = "2024-05-24"

[vars]
ENVIRONMENT = "development"
LOG_LEVEL   = "info"

[[kv_namespaces]]
binding = "AAF_KV"
id      = "REPLACE_WITH_AAF_SMS_KV_ID"

[[services]]
binding = "API_GATEWAY"
service = "api-gateway"

# Secrets (wrangler secret put):
#   AFRICASTALKING_API_KEY
#   AFRICASTALKING_USERNAME
#   AFRICASTALKING_SENDER_ID
